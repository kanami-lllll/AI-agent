<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>客户端模型管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #f8f9fa;
            width: 240px;
            transition: all 0.3s;
        }
        .sidebar-sticky {
            position: relative;
            top: 0;
            height: calc(100vh - 48px);
            padding-top: .5rem;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .navbar-brand {
            padding-top: .75rem;
            padding-bottom: .75rem;
            font-size: 1rem;
            background-color: rgba(0, 0, 0, .25);
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .25);
        }
        .main-content {
            margin-left: 240px;
            padding: 20px;
            transition: all 0.3s;
        }
        .masked-key {
            font-family: Consolas, monospace;
            letter-spacing: 0.04em;
        }
        @media (max-width: 991.98px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding-top: 0;
            }
            .sidebar-sticky {
                height: auto;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="../index.html">AI Agent Console</a>
    <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
</header>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
            <div class="position-sticky pt-3"></div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
            <div id="content-client-model">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">客户端模型管理</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="btn-add-client-model">
                            <i class="fas fa-plus"></i> <span class="d-none d-sm-inline">新增模型连接</span>
                        </button>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <div class="input-group">
                            <input type="text" class="form-control" id="search-model-name" placeholder="按模型名称搜索">
                            <button class="btn btn-outline-secondary" type="button" id="btn-search-model">搜索</button>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-sm align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>模型名称</th>
                            <th class="d-none d-md-table-cell">模型类型</th>
                            <th class="d-none d-lg-table-cell">基础地址</th>
                            <th class="d-none d-lg-table-cell">模型版本</th>
                            <th class="d-none d-xl-table-cell">API Key</th>
                            <th>状态</th>
                            <th class="d-none d-md-table-cell">更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="client-model-list"></tbody>
                    </table>
                </div>

                <nav aria-label="Page navigation" class="mt-3">
                    <ul class="pagination pagination-sm flex-wrap justify-content-center" id="pagination"></ul>
                </nav>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="clientModelModal" tabindex="-1" aria-labelledby="clientModelModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="clientModelModalLabel">新增客户端模型</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="clientModelForm">
                    <input type="hidden" id="client-model-id">
                    <div class="mb-3">
                        <label for="client-model-name" class="form-label">模型名称</label>
                        <input type="text" class="form-control" id="client-model-name" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="client-model-type" class="form-label">模型类型</label>
                            <select class="form-select" id="client-model-type">
                                <option value="openai">openai</option>
                                <option value="azure">azure</option>
                                <option value="compatible">compatible</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="client-model-version" class="form-label">模型版本</label>
                            <input type="text" class="form-control" id="client-model-version" placeholder="例如 gpt-4o-mini" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="client-model-base-url" class="form-label">基础地址 Base URL</label>
                        <input type="text" class="form-control" id="client-model-base-url" placeholder="例如 https://api.openai.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="client-model-api-key" class="form-label">API Key</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="client-model-api-key" autocomplete="off" required>
                            <button class="btn btn-outline-secondary" type="button" id="btn-toggle-api-key">显示</button>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="client-model-completions-path" class="form-label">Completions Path</label>
                            <input type="text" class="form-control" id="client-model-completions-path" placeholder="v1/chat/completions">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="client-model-embeddings-path" class="form-label">Embeddings Path</label>
                            <input type="text" class="form-control" id="client-model-embeddings-path" placeholder="v1/embeddings">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="client-model-timeout" class="form-label">超时时间（秒）</label>
                            <input type="number" class="form-control" id="client-model-timeout" min="1" value="30">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="client-model-status" class="form-label">状态</label>
                            <select class="form-select" id="client-model-status">
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btn-save-client-model">保存</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteModalLabel">确认删除</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>确定要删除这个模型连接吗？此操作不可恢复。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="btn-confirm-delete">删除</button>
            </div>
        </div>
    </div>
</div>

<script src="../../js/config.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/js/bootstrap.bundle.min.js"></script>
<script src="../js/client-model.js"></script>
</body>
</html>
